# Example of varying contribution percentages by pay period:
#
# payroll:
#   contribution_schedule:
#     pretax_401k_pct: [0.10, 0.08, 0.06, 0.04, 0.04]  # Decrease over time
#     roth_401k_pct: [0.02, 0.04, 0.06, 0.08, 0.08]    # Increase over time
#     aftertax_401k_pct: [0.15]                         # Constant
#     espp_pct: [0.15, 0.15, 0.10, 0.10, 0.05]         # Decrease over time

# Example with deductions and extra income:
#
# payroll:
#   salary_annual: 200000
#   extra_income_per_period: 500      # $500 extra per paycheck (e.g., car allowance)
#   health_deductions_per_period: 300 # $300 health insurance per paycheck
#   group_term_life_per_period: 25    # $25 group term life insurance per paycheck
#   
#   # This results in different tax bases:
#   # - Federal/State: $8,333 + $500 + $25 - $401k - $300 = varies by 401k contribution
#   # - FICA: $8,333 + $500 + $25 - $300 = $8,558 per paycheck
#   # - CA voluntary: $8,333 + $500 + $25 - $300 - $25 = $8,533 per paycheck

# Example with fractional start period (business days):
#
# person:
#   start_date: "2025-07-28"  # Monday start
#   # Results in:
#   # - Skips July 16-31 period (partial)
#   # - First paycheck on August 15 with 1.333x multiplier
#   # - Covers July 28-31 (4 business days) + August 1-15 (11 business days)
#   # - Fractional calculation: 4 worked days / 12 total business days in July period = 0.333

# RSU Grant Logic Example (nvidia_quarterly type):
#
# For employment_start_date: "2024-03-15" with target_value_usd: 140000
# 1. Grant date: 6th business day of April 2024 (following month)
# 2. Share calculation: 30-day average price ending March 31, 2024
# 3. Shares granted: $140,000 / average_price, rounded down
# 4. First vest date: 3rd Wednesday of June 2024 (grant in Apr-Jun -> Sep first vest)
# 5. Subsequent vests: Quarterly on 3rd Wed Mar/Jun/Sep, 2nd Wed Dec
# 6. Each vest: 6.25% of total shares (16 vests total over 4 years)
# 7. Whole-share rounding via cumulative floor method
